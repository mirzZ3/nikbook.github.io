<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>💬 Онлайн Мессенджер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }

        body {
            background: var(--body-bg, linear-gradient(145deg, #1a2639 0%, #0d1b2a 100%));
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            transition: background 0.3s ease;
        }

        .messenger {
            width: 100%;
            max-width: 700px;
            height: 85vh;
            min-height: 600px;
            background: var(--msg-bg, #15202b);
            border-radius: 32px;
            box-shadow: 0 25px 40px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(120, 180, 255, 0.1);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            backdrop-filter: blur(2px);
            transition: background 0.3s ease;
        }

        /* Шапка */
        .chat-header {
            background: var(--header-bg, #1e2c3a);
            padding: 16px 20px;
            display: flex;
            align-items: center;
            gap: 14px;
            border-bottom: 1px solid var(--border-color, #2e4459);
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: background 0.3s ease, border-color 0.3s ease;
        }

        .chat-header h2 {
            color: var(--header-text, #e1f0fa);
            font-weight: 600;
            font-size: 1.6rem;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 5px #00000040;
        }

        .online-badge {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-left: auto;
            background: var(--badge-bg, #0f1a24);
            padding: 6px 16px;
            border-radius: 40px;
            border-left: 4px solid #2ecc71;
        }

        .online-dot {
            width: 12px;
            height: 12px;
            background: #2ecc71;
            border-radius: 50%;
            box-shadow: 0 0 12px #2ecc71;
            animation: pulse 1.8s infinite;
        }

        .online-count {
            color: var(--badge-text, #cde5f5);
            font-weight: 600;
            font-size: 1rem;
        }

        .settings-btn {
            background: var(--settings-btn-bg, #2c4459);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: 0.15s;
            box-shadow: 0 2px 6px rgba(0,0,0,0.3);
            border-bottom: 2px solid #1d3345;
        }

        .settings-btn:hover {
            background: var(--settings-btn-hover, #3a5a74);
            transform: scale(0.95);
        }

        /* Панель настроек */
        .settings-panel {
            background: var(--settings-panel-bg, #1a2c3b);
            padding: 16px 20px;
            border-bottom: 1px solid var(--border-color, #2e4459);
            display: none;
            animation: slideDown 0.25s ease;
        }

        .settings-panel.show {
            display: block;
        }

        .theme-selector {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .theme-btn {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.9rem;
            transition: 0.15s;
            box-shadow: 0 3px 0 rgba(0,0,0,0.2);
            color: white;
        }

        .theme-btn.dark {
            background: #1e2c3a;
            border-bottom: 2px solid #0f1a24;
        }

        .theme-btn.light {
            background: #dfe6e9;
            color: #2d3436;
            border-bottom: 2px solid #b2bec3;
        }

        .theme-btn.blue {
            background: #2980b9;
            border-bottom: 2px solid #1a5276;
        }

        .theme-btn.green {
            background: #27ae60;
            border-bottom: 2px solid #1e8449;
        }

        .theme-btn.purple {
            background: #8e44ad;
            border-bottom: 2px solid #6c3483;
        }

        .theme-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 0 rgba(0,0,0,0.2);
        }

        .theme-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 rgba(0,0,0,0.2);
        }

        .theme-btn.active {
            outline: 3px solid #f1c40f;
            outline-offset: 2px;
        }

        /* Область сообщений */
        .messages-container {
            flex: 1;
            overflow-y: auto;
            padding: 18px 14px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            background: var(--messages-bg, #101a24);
            background-image: var(--messages-gradient, radial-gradient(circle at 20% 30%, #1a2b38 0%, #0e1922 100%));
            scroll-behavior: smooth;
            transition: background 0.3s ease;
        }

        /* Кастомный скролл */
        .messages-container::-webkit-scrollbar {
            width: 6px;
        }
        .messages-container::-webkit-scrollbar-track {
            background: var(--scroll-track, #1b2936);
            border-radius: 10px;
        }
        .messages-container::-webkit-scrollbar-thumb {
            background: var(--scroll-thumb, #3d637c);
            border-radius: 10px;
        }

        /* Сообщения */
        .message-wrapper {
            display: flex;
            width: 100%;
            animation: fadeIn 0.2s ease;
        }

        .message-wrapper.own {
            justify-content: flex-end;
        }

        .message-bubble {
            max-width: 80%;
            padding: 12px 16px;
            border-radius: 22px;
            word-break: break-word;
            box-shadow: 0 3px 8px rgba(0, 0, 0, 0.3);
            position: relative;
            transition: transform 0.1s, background 0.3s ease;
        }

        .own .message-bubble {
            background: var(--own-msg-bg, linear-gradient(135deg, #1f8e6b, #126b4e));
            color: var(--own-msg-text, white);
            border-bottom-right-radius: 6px;
            border: 1px solid var(--own-msg-border, #2eaf81);
        }

        .other .message-bubble {
            background: var(--other-msg-bg, linear-gradient(135deg, #253e50, #1a2d3c));
            color: var(--other-msg-text, #ecf3fa);
            border-bottom-left-radius: 6px;
            border: 1px solid var(--other-msg-border, #3a5569);
        }

        .system .message-bubble {
            background: var(--system-msg-bg, #2a3543);
            color: var(--system-msg-text, #bdd3e6);
            font-style: italic;
            max-width: 90%;
            margin: 0 auto;
            text-align: center;
            border-radius: 30px;
            padding: 8px 20px;
            font-size: 0.9rem;
            border: 1px dashed var(--system-msg-border, #5f7f9c);
            box-shadow: none;
        }

        .message-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 5px;
        }

        .sender-name {
            font-weight: 700;
            font-size: 0.9rem;
            opacity: 0.9;
        }

        .own .sender-name {
            color: var(--own-sender, #d4f5e5);
        }

        .other .sender-name {
            color: var(--other-sender, #9fc8f0);
        }

        .message-time {
            font-size: 0.7rem;
            opacity: 0.7;
            margin-left: auto;
        }

        .message-text {
            line-height: 1.4;
            font-size: 1rem;
            white-space: pre-wrap;
        }

        /* Система ввода */
        .input-area {
            background: var(--input-area-bg, #1b2936);
            padding: 14px 18px;
            display: flex;
            gap: 12px;
            border-top: 1px solid var(--border-color, #2e4b60);
            align-items: center;
            transition: background 0.3s ease;
        }

        .input-wrapper {
            flex: 1;
            display: flex;
            background: var(--input-bg, #0f1a24);
            border-radius: 60px;
            padding: 4px 4px 4px 20px;
            border: 1px solid var(--input-border, #3c6079);
            transition: 0.15s;
        }
        .input-wrapper:focus-within {
            border-color: #2ecc71;
            box-shadow: 0 0 0 3px rgba(46, 204, 113, 0.2);
            background: var(--input-focus-bg, #13212e);
        }

        #messageInput {
            flex: 1;
            background: transparent;
            border: none;
            padding: 14px 8px 14px 0;
            color: var(--input-text, #ecf9ff);
            font-size: 1rem;
            outline: none;
        }

        #messageInput::placeholder {
            color: var(--placeholder, #7e9bb0);
            font-weight: 400;
        }

        .send-btn {
            background: var(--send-btn-bg, #1e855c);
            border: none;
            border-radius: 60px;
            width: 52px;
            height: 52px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.15s;
            color: white;
            font-size: 22px;
            box-shadow: 0 4px 0 var(--send-btn-shadow, #0e4a36);
            border-bottom: 2px solid var(--send-btn-border, #27ae60);
        }

        .send-btn:hover {
            background: var(--send-btn-hover, #27ae60);
            transform: scale(0.97);
            box-shadow: 0 2px 0 var(--send-btn-shadow, #0e4a36);
        }

        .send-btn:active {
            transform: translateY(3px);
            box-shadow: 0 1px 0 var(--send-btn-shadow, #0e4a36);
        }

        .name-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        #nameInput {
            background: var(--input-bg, #0f1a24);
            border: 1px solid var(--input-border, #3c6079);
            border-radius: 40px;
            padding: 12px 18px;
            color: var(--input-text, white);
            width: 160px;
            font-size: 0.9rem;
            outline: none;
        }

        #nameInput:focus {
            border-color: #3498db;
        }

        .update-name-btn {
            background: var(--settings-btn-bg, #2c4459);
            border: none;
            color: white;
            padding: 10px 14px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: 600;
            font-size: 0.8rem;
            border-bottom: 2px solid #1d3345;
        }

        .footer-note {
            font-size: 0.75rem;
            color: var(--footer-text, #6e93aa);
            margin-left: 8px;
        }

        .connection-status {
            font-size: 0.8rem;
            padding: 2px 10px;
            border-radius: 20px;
            background: var(--status-bg, #1f384b);
            color: var(--status-text, #b0d9ff);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(6px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes pulse {
            0% { opacity: 0.7; }
            50% { opacity: 1; box-shadow: 0 0 16px #2ecc71; }
            100% { opacity: 0.7; }
        }
    </style>
</head>

    </div>

    <!-- Панель настроек темы -->
    <div class="settings-panel" id="settingsPanel">
        <div class="theme-selector">
            <button class="theme-btn dark active" data-theme="dark">🌙 Тёмная</button>
            <button class="theme-btn light" data-theme="light">☀️ Светлая</button>
            <button class="theme-btn blue" data-theme="blue">💙 Синяя</button>

            <button class="theme-btn purple" data-theme="purple">💜 Фиолетовая</button>
        </div>
    </div>

    <!-- Область сообщений -->
    <div class="messages-container" id="messagesContainer">
        <div class="message-wrapper system">
            <div class="message-bubble">✨ Добро пожаловать! Выберите тему и общайтесь.</div>
        </div>
    </div>

    <!-- Панель ввода -->
    <div class="input-area">
        <div class="name-row">
            <input type="text" id="nameInput" placeholder="Ваше имя" maxlength="20" value="Гость">
            <button class="update-name-btn" id="setNameBtn">↻ сменить</button>
        </div>
        <div style="flex:1"></div>
        <div class="footer-note" id="typingIndicator"></div>
    </div>
    <div class="input-area" style="padding-top: 4px;">
        <div class="input-wrapper">
            <input type="text" id="messageInput" placeholder="Введите сообщение..." autocomplete="off" maxlength="400">
            <button class="send-btn" id="sendBtn">➤</button>

</div>

        const themeButtons = document.querySelectorAll('.theme-btn');
        const settingsToggle = document.getElementById('settingsToggle');
        const settingsPanel = document.getElementById('settingsPanel');

        // Применить тему
        function applyTheme(themeName) {
            const theme = themes[themeName];
            if (!theme) return;
            
            Object.entries(theme).forEach(([key, value]) => {
                root.style.setProperty(`--${key}`, value);
            });
            
            // Сохранить выбор
            localStorage.setItem('chat_theme', themeName);
            
            // Обновить активную кнопку
            themeButtons.forEach(btn => {
                btn.classList.remove('active');
                if (btn.dataset.theme === themeName) {
                    btn.classList.add('active');
                }
            });
        }

        // Загрузить сохранённую тему
        const savedTheme = localStorage.getItem('chat_theme') || 'dark';
        applyTheme(savedTheme);

        // Обработчики кнопок тем
        themeButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const theme = btn.dataset.theme;
                applyTheme(theme);
            });
        });

        // Переключение панели настроек
        settingsToggle.addEventListener('click', () => {
            settingsPanel.classList.toggle('show');
        });

        // Закрыть панель при клике вне (опционально)
        document.addEventListener('click', (e) => {
            if (!settingsPanel.contains(e.target) && !settingsToggle.contains(e.target)) {
                settingsPanel.classList.remove('show');
            }
        });

        let currentUser = {
            id: 'user-' + Math.random().toString(36).substr(2, 8),
            name: 'Гость'
        };

        let messages = [];
        let onlineCount = 1;
        let isTyping = false;
        let typingTimeout = null;

        const channel = new BroadcastChannel('messenger_channel');

        channel.onmessage = (event) => {
            const data = event.data;
            if (data.type === 'chat_message') {
                addMessageToDOM(data.message, data.isOwn ? 'own' : 'other');
                if (!data.isOwn) messages.push(data.message);
                scrollToBottom();
            } else if (data.type === 'user_joined') {
                addSystemMessage(`👤 ${data.name} присоединился`);
                updateOnline(data.onlineCount);
            } else if (data.type === 'user_left') {
                addSystemMessage(`👋 ${data.name} покинул чат`);
                updateOnline(data.onlineCount);
            } else if (data.type === 'typing') {
                if (data.userId !== currentUser.id) {
                    typingIndicator.textContent = `${data.name} печатает...`;
                    clearTimeout(window.typingHideTimeout);
                    window.typingHideTimeout = setTimeout(() => {
                        typingIndicator.textContent = '';
                    }, 2000);
                }
            }
        };

        function broadcast(data) {
            channel.postMessage(data);
        }

        function updateOnline(count) {
            onlineCount = count || onlineCount;
            onlineCounter.textContent = `${onlineCount} онлайн`;
        }

        function addSystemMessage(text) {
            const msgDiv = document.createElement('div');
            msgDiv.className = 'message-wrapper system';
            msgDiv.innerHTML = `<div class="message-bubble">${escapeHtml(text)}</div>`;
            messagesContainer.appendChild(msgDiv);
            scrollToBottom();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function addMessageToDOM(msg, type = 'other') {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${type}`;
            
            const timeStr = new Date(msg.timestamp).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            let senderDisplay = type === 'own' ? 'Вы' : (msg.senderName || msg.senderId);
            
            wrapper.innerHTML = `
                <div class="message-bubble">
                    <div class="message-header">
                        <span class="sender-name">${escapeHtml(senderDisplay)}</span>
                        <span class="message-time">${timeStr}</span>
                    </div>
                    <div class="message-text">${escapeHtml(msg.text)}</div>
                </div>
            `;
            messagesContainer.appendChild(wrapper);
        }

        function scrollToBottom() {
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function sendMessage(text) {
            if (!text.trim()) return;
            
            const message = {
                id: Date.now() + '-' + Math.random().toString(36),
                text: text.trim(),
                senderId: currentUser.id,
                senderName: currentUser.name,
                timestamp: Date.now()
            };
            
            addMessageToDOM(message, 'own');
            messages.push(message);
            
            broadcast({
                type: 'chat_message',
                message: message,
                isOwn: false
            });
            
            scrollToBottom();
            scheduleBotReply(message.text);
        }
